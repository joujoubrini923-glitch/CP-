<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Groups — Abdelmajid CP</title>
<link rel="stylesheet" href="assets/style.css">
</head>
<body>
<nav class="site-nav" id="site-nav"></nav>

<header class="page-header">
  <div class="wrap">
    <span class="breadcrumb"><a href="index.html">home</a> / groups</span>
    <h1>Student Groups</h1>
    <p style="max-width:60ch;">Each group trains at its own pace and has its own roster page — click through for photos, current scores and problems assigned to that level.</p>
  </div>
</header>

<section>
  <div class="wrap">
    <div class="grid grid-3" id="groups-list"></div>
  </div>
</section>

<footer id="site-footer"></footer>

<script src="assets/config.js"></script>
<script src="assets/data.js"></script>
<script src="assets/app.js"></script>
<script>
(async function() {
  renderNav('groups.html');
  renderFooter();
  const { data, cloudError } = await loadAppData();
  if (cloudError) console.warn('Cloud sync issue:', cloudError);

  document.getElementById('groups-list').innerHTML = data.groups.map(g => {
    const members = data.students.filter(s => s.groupId === g.id);
    const avg = members.length ? Math.round(members.reduce((a,s)=>a+s.score,0)/members.length) : 0;
    const facesHtml = members.slice(0,5).map(s => avatarHtml(s.name, s.photo, s.score, 'avatar')).join('');
    return `
      <a href="group.html?id=${g.id}" class="card group-card">
        <span class="count">${members.length} student${members.length===1?'':'s'}</span>
        <h3>${g.name}</h3>
        <p>${g.description}</p>
        <div class="avatar-stack">${facesHtml}</div>
        <p class="mono" style="font-size:12px; margin:0;">avg score: <b style="color:var(--gold)">${avg}</b></p>
      </a>`;
  }).join('') || '<div class="empty">No groups yet. Add one from the Admin page.</div>';
})();
</script>
</body>
</html>
